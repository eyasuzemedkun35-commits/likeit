<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Love Letter</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  overflow:hidden;
  font-family:'Cormorant Garamond', serif;
  /* Animated dreamy gradient */
  background: linear-gradient(-45deg, #ffe7dd, #fff0ea, #f9d8ce, #fce3db);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color:#4a2123; /* Deeper, warmer romantic text color */
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* SCREEN CONTAINERS */
.screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  transition: opacity 1s ease, transform 1s ease;
  opacity: 0;
  pointer-events: none;
  z-index: 1;
}

.screen.active {
  opacity: 1;
  pointer-events: auto;
  z-index: 10;
}

.screen.fade-out {
  opacity: 0;
  transform: scale(0.95);
  pointer-events: none;
}

/* OPENING */
#openingText {
  font-family:'Playfair Display', serif;
  font-size:24px;
  font-style: italic;
  padding: 0 20px;
  animation: breathe 3s ease-in-out infinite alternate;
}

@keyframes breathe {
  0% { transform: scale(1); opacity: 0.9; }
  100% { transform: scale(1.03); opacity: 1; }
}

#tap {
  margin-top:35px;
  font-size:14px;
  letter-spacing:4px;
  cursor:pointer;
  opacity:0.6;
  text-transform: uppercase;
  transition: opacity 0.3s;
}

#tap:hover { opacity:1; }

/* REALISTIC ENVELOPE */
.envelope-wrapper {
  position: relative;
  width: 280px;
  height: 190px;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.envelope-wrapper:hover {
  transform: translateY(-10px) scale(1.02);
}

.envelope {
  position: relative;
  width: 100%;
  height: 100%;
  background: #e6c8bd; /* Envelope back */
  border-radius: 8px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.envelope::before {
  /* Envelope Flap */
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 140px solid transparent;
  border-right: 140px solid transparent;
  border-top: 105px solid #dfb5a7; /* Darker flap */
  z-index: 3;
  border-radius: 8px 8px 0 0;
  transform-origin: top;
  transition: transform 0.6s ease;
}

.envelope::after {
  /* Envelope Front (bottom triangle) */
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 140px solid #f2ddd5;
  border-right: 140px solid #f2ddd5;
  border-bottom: 100px solid #eed2c8;
  z-index: 2;
  border-radius: 0 0 8px 8px;
}

.envelope-wrapper.open .envelope::before {
  transform: rotateX(180deg);
  z-index: 1;
}

/* Little wax seal */
.seal {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 45px;
  height: 45px;
  background: #c23b3b;
  border-radius: 50%;
  z-index: 4;
  box-shadow: 0 3px 6px rgba(0,0,0,0.2), inset 0 0 5px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: #ffcccc;
  transition: opacity 0.3s;
}

.envelope-wrapper.open .seal {
  opacity: 0;
}

.click-hint {
  margin-top: 40px;
  font-size: 14px;
  letter-spacing: 2px;
  opacity: 0.7;
}

/* LETTER SCREEN */
#letterScreen {
  padding: 20px;
}

.letter-container {
  width: 95%;
  max-width: 600px;
  height: 85vh;
  background: #fffcfaf0; /* Slightly transparent warm white */
  backdrop-filter: blur(12px);
  border-radius: 8px;
  padding: 50px 40px;
  overflow-y: auto;
  box-shadow: 0 25px 60px rgba(74, 33, 35, 0.15), inset 0 0 20px rgba(230, 200, 189, 0.3);
  text-align: center; /* Centers the poetic format nicely */
  border: 1px solid rgba(255, 255, 255, 0.6);
}

.letter-container p {
  font-size: 20px;
  line-height: 1.8;
  margin-bottom: 24px;
  color: #4a2123;
}

/* Custom Scrollbar */
.letter-container::-webkit-scrollbar {
  width: 6px;
}
.letter-container::-webkit-scrollbar-track {
  background: transparent;
}
.letter-container::-webkit-scrollbar-thumb {
  background: #d9b8af;
  border-radius: 10px;
}

/* FLOATING HEARTS (Enhanced) */
.heart {
  position: fixed;
  bottom: -50px;
  pointer-events: none;
  z-index: 100;
  animation: floatUp 4s ease-in forwards;
  opacity: 0;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
  20% { opacity: 0.8; }
  100% { transform: translateY(-120vh) scale(1.2) rotate(45deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="screen active" id="opening">
  <div id="openingText">💌 adoniyee yeheyaw lene leyet yelal eshi ☺️</div>
  <div id="tap">Tap to open</div>
</div>

<div class="screen" id="envelopeScreen">
  <div class="envelope-wrapper" id="envelopeBtn">
    <div class="envelope"></div>
    <div class="seal">❤</div>
  </div>
  <div class="click-hint">tap the envelope</div>
</div>

<div class="screen" id="letterScreen">
  <div class="letter-container" id="letterBox"></div>
</div>

<script>
const letter = `My favorite memory with you isn’t just one moment.

It’s the everyday moments I get to share with you.

But if I had to choose, it would be the way you laugh —
the kind that doesn’t stop,
the kind that makes everything feel lighter.

I remember how I shared even the smallest details with you,
and somehow…
you still enjoyed them.

Like they mattered.
Like I mattered.

I remember how you respected me,
even in the simplest things I said.

And at the same time,
I remember myself…

thinking too much.

Wondering:
"does she like me?"
"am I the right person for her?"
"did I do everything right?"
"what if she doesn’t like this?"

That constant care I had for you…
from every angle.

That quiet pressure of wanting you to have the best,
of wanting to be enough for you.

And somehow…

those thoughts,
that stress,
that care —

they became my most valuable memories.

Not because there aren’t better ones…

but because they came from loving you.

From wanting to care for you.

From choosing you,
in every small moment.

And I haven’t forgotten…

the times you sent me pictures and videos.

How something so simple
could change everything inside me.

Like warmth spreading through me —
like summer in my heart,
even when everything outside felt like rain.`;

/* DOM ELEMENTS */
const openingScreen = document.getElementById("opening");
const envelopeScreen = document.getElementById("envelopeScreen");
const letterScreen = document.getElementById("letterScreen");
const envelopeBtn = document.getElementById("envelopeBtn");
const letterBox = document.getElementById("letterBox");

/* NAVIGATION WITH SMOOTH TRANSITIONS */
document.getElementById("opening").onclick = () => {
  openingScreen.classList.remove("active");
  openingScreen.classList.add("fade-out");
  
  setTimeout(() => {
    envelopeScreen.classList.add("active");
  }, 600); // Wait for fade out
};

envelopeBtn.onclick = () => {
  // 1. Play envelope open animation
  envelopeBtn.classList.add("open");
  
  // 2. Wait a second, then fade out envelope screen and fade in letter
  setTimeout(() => {
    envelopeScreen.classList.remove("active");
    envelopeScreen.classList.add("fade-out");
    
    setTimeout(() => {
      letterScreen.classList.add("active");
      letterBox.innerHTML = formatLetter(letter);
      startHeartGenerator();
    }, 600);
  }, 800);
};

/* FORMAT LETTER (Preserves correct line breaks for poetry) */
function formatLetter(text) {
  // Split by double line breaks for paragraphs, 
  // replace single line breaks with <br> to keep poetic pacing.
  return text
    .split("\n\n")
    .map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`)
    .join("");
}

/* ENHANCED SWAYING HEART EFFECT */
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  
  // Randomize heart content (different emojis/colors)
  const hearts = ["❤️", "💖", "✨", "💕", "🤍"];
  heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
  
  // Randomize position and size
  heart.style.left = Math.random() * 100 + "vw";
  const size = Math.random() * 1.5 + 0.8; // 0.8x to 2.3x size
  heart.style.fontSize = `${20 * size}px`;
  
  // Randomize animation duration slightly
  const duration = Math.random() * 3 + 4; // 4s to 7s
  heart.style.animationDuration = `${duration}s`;

  document.body.appendChild(heart);

  // Remove element after animation finishes
  setTimeout(() => heart.remove(), duration * 1000);
}

function startHeartGenerator() {
  // Spawn an initial burst of hearts
  for(let i=0; i<15; i++) {
    setTimeout(createHeart, Math.random() * 1000);
  }
  
  // Continue spawning hearts periodically while reading
  setInterval(() => {
    if(Math.random() > 0.4) { // 60% chance to spawn a heart every 800ms
      createHeart();
    }
  }, 800);
}
</script>

</body>
</html>
